<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Receipt</title>

<link rel="stylesheet" href="receipt.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="receipt-header">

    <div class="paid-badge">
    ✅ PAID
</div>

    <img src="images/logo.PNG"
         id="receiptLogo"
         alt="RR Technologies Logo">

    <h1 id="gymName">RR Technologies Gym</h1>

    <div class="receipt-title">

        PAYMENT RECEIPT

    </div>

    <div class="gym-info">

        <p id="gymAddress"></p>

        <p>

            📞 <span id="gymMobile"></span>

        </p>

    </div>

</div>

<hr>

    <div class="receipt-info">

        <div>
            <b>Receipt No :</b>
            <span id="receiptNo"></span>
        </div>

        <div>
            <b>Date :</b>
            <span id="date"></span>
        </div>

        <div>
            <b>Time :</b>
            <span id="time"></span>
        </div>

    </div>

    <hr>

    <table>

        <tr>
            <td>Member ID</td>
            <td id="memberId"></td>
        </tr>

        <tr>
            <td>Member Name</td>
            <td id="memberName"></td>
        </tr>

        <tr>
            <td>Membership</td>
            <td id="plan"></td>
        </tr>

        <tr>
            <td>Amount</td>
            <td id="amount"></td>
        </tr>

        <tr>
            <td>Payment Mode</td>
            <td id="mode"></td>
        </tr>

        <tr>
            <td>Joining Date</td>
            <td id="joiningDate"></td>
        </tr>

        <tr>
            <td>Expiry Date</td>
            <td id="expiryDate"></td>
        </tr>

    </table>

    <hr>

    <div class="footer">

    <div class="footer-left">

        <h3>Thank You For Visiting</h3>

        <p>Stay Healthy 💪</p>

    </div>

    <div class="footer-right">

        <div class="signature">

            Authorized Signature

        </div>
        
        <small>
            
            Powered By RR Technologies
            
        </small>

    </div>

</div>

<div class="buttons">

    <button class="print-btn" onclick="window.print()">
        <i class="fa-solid fa-print"></i>
        Print
    </button>

    <button class="whatsapp-btn" onclick="shareWhatsApp()">
        <i class="fa-brands fa-whatsapp"></i>
        Share to Customer
    </button>

    <button class="close-btn" onclick="window.close()">
        <i class="fa-solid fa-xmark"></i>
        Close
    </button>

</div>

<script src="receipt.js"></script>

</body>

</html>
