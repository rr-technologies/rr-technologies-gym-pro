<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings - RR Technologies Gym Pro</title>

    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="settings.css">
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebarContainer"></div>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Hero Banner -->
        <section class="settings-hero">

            <div class="hero-left">

                <div class="hero-icon">
                    ⚙️
                </div>

                <div>

                    <h1>Gym Settings</h1>

                    <p>
                        Configure your Gym Information, Branding,
                        Backup & Restore Settings
                    </p>

                </div>

            </div>

        </section>


        <!-- Main Card -->

        <section class="settings-card">

            <form id="settingsForm">

                <h2 class="section-title">
                    🏋 Gym Information
                </h2>

                <label>Gym Name</label>
                <input type="text" id="gymName">

                <label>Owner Name</label>
                <input type="text" id="ownerName">

                <label>Mobile Number</label>
                <input type="text" id="mobile">

                <label>Email</label>
                <input type="email" id="email">

                <label>Address</label>
                <textarea id="address"></textarea>

                <label>Receipt Prefix</label>
                <input
                    type="text"
                    id="receiptPrefix"
                    value="RCPT">

                <label>Currency</label>

                <select id="currency">

                    <option value="₹">
                        Indian Rupee (₹)
                    </option>

                    <option value="$">
                        US Dollar ($)
                    </option>

                    <option value="€">
                        Euro (€)
                    </option>

                </select>

                <hr>

                <h2 class="section-title">

                    🖼 Gym Branding

                </h2>

                <div class="logo-section">

                    <label for="gymLogo">
                        Upload Gym Logo
                    </label>

                    <input
                        type="file"
                        id="gymLogo"
                        accept="image/*">

                    <img
                        id="logoPreview"
                        src=""
                        alt="Logo Preview">

                </div>

                <div class="button-group">

                    <button
                        type="submit"
                        class="save-btn">

                        💾 Save Settings

                    </button>

                    <button
                        type="reset"
                        class="reset-btn">

                        🔄 Reset

                    </button>

                </div>

            </form>

        </section>


        <!-- Backup Card -->

        <section class="settings-card">

            <h2 class="section-title">

                💾 Data Backup & Restore

            </h2>

            <div class="backup-section">

                <button
                    id="backupBtn"
                    class="backup-btn">

                    💾 Backup Data

                </button>

                <br><br>

                <input
                    type="file"
                    id="restoreFile"
                    accept=".json">

                <button
                    id="restoreBtn"
                    class="restore-btn">

                    📂 Restore Data

                </button>

            </div>

        </section>

    </main>

    <!-- Scripts -->

    <script src="sidebar.js"></script>

    <script src="common.js"></script>
    
    <script src="settings.js"></script>

</body>
</html>
