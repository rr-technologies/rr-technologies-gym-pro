<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - RR Technologies</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="settings.css">
</head>
<body>

<div class="sidebar">
     <img id="sidebarLogo" src="logo.png" alt="Gym Logo">
    <h2 id="sidebarGymName">RR Technologies</h2>

    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="member-registration.html">👤 Member Registration</a>
    <a href="members-list.html">👥 Members List</a>
    <a href="fee-collection.html">💰 Fee Collection</a>
    <a href="attendance.html">📅 Attendance</a>
    <a href="reports.html">📊 Reports</a>
    <a href="settings.html" class="active">⚙️ Settings</a>
    <a href="index.html">🚪 Logout</a>
</div>

<div class="main-content">

<h1>Gym Settings</h1>

<div class="form-container">

<form id="settingsForm">

<label>Gym Name</label>
<input type="text" id="gymName">

<label>Owner Name</label>
<input type="text" id="ownerName">

<label>Mobile Number</label>
<input type="text" id="mobile">

<label>Email</label>
<input type="email" id="email">

<label>Address</label>
<textarea id="address"></textarea>

<label>Receipt Prefix</label>
<input type="text" id="receiptPrefix" value="RCPT">

<label>Currency</label>
<select id="currency">
    <option value="₹">Indian Rupee (₹)</option>
    <option value="$">US Dollar ($)</option>
    <option value="€">Euro (€)</option>
</select>

<br><br>

<div class="form-group">
    <label for="gymLogo">Gym Logo</label>

    <input type="file"
           id="gymLogo"
           accept="image/*">

    <br><br>

    <img id="logoPreview"
         src="logo.png"
         alt="Logo Preview"
         style="
            width:120px;
            height:120px;
            object-fit:contain;
            border:1px solid #ccc;
            border-radius:10px;
            padding:8px;
            background:#fff;
         ">
</div>

<button type="submit">💾 Save Settings</button>
<button type="reset">🔄 Reset</button>

</form>

<hr style="margin:30px 0;">

<h2>💾 Data Backup & Restore</h2>

<div class="backup-section">

    <button id="backupBtn" class="backup-btn">
        💾 Backup Data
    </button>

    <br><br>

    <input
        type="file"
        id="restoreFile"
        accept=".json">

    <button id="restoreBtn" class="restore-btn">
        📂 Restore Data
    </button>

</div>

</div>

</div>

<script src="settings.js"></script>

</body>
</html>
