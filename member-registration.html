<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Registration - RR Technologies</title>

    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="member.css">
</head>
<body>

<!-- Sidebar -->
<div id="sidebarContainer"></div>

    

<!-- Main Content -->
<div class="main-content">

    <div class="hero-banner">

    <div class="hero-text">

        <h2> Member Registration</h2>

    </div>

</div>

    <div class="form-container">

        <form id="memberForm">

            <input type="text" id="memberId" placeholder="Member ID" readonly>

            <input type="text" id="fullName" placeholder="Full Name" required>

            <input type="text" id="mobile" placeholder="Mobile Number" required>

            <input type="number" id="age" placeholder="Age" required>

            <select id="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <select id="membership" required>
                <option value="">Select Membership Plan</option>
                <option>1 Month</option>
                <option>3 Months</option>
                <option>6 Months</option>
                <option>12 Months</option>
                <option>Custom Days</option>
            </select>

            <div id="customDaysContainer" style="display:none;">
    <input
        type="number"
        id="customDays"
        placeholder="Enter Custom Days"
        min="1">
</div>

            <input type="date" id="joiningDate" required>

            <input type="date" id="testDate" placeholder="Test Date">

            <!-- Payment Details -->

<input
    type="number"
    id="totalFee"
    placeholder="Total Fee Amount"
    min="0"
    required>

<input
    type="number"
    id="advancePaid"
    placeholder="Advance Paid Amount"
    min="0"
    value="0"
    required>

<input
    type="number"
    id="balanceAmount"
    placeholder="Balance Amount"
    readonly>

<div id="balanceDueDateContainer" style="display:none;">

    <input
        type="date"
        id="balanceDueDate">

</div>

            <textarea id="address" placeholder="Address"></textarea>

            <button type="submit">💾 Save Member</button>

        </form>

    </div>

</div>

<script src="common.js"></script>
<script src="member.js"></script>
<script src="sidebar.js"></script>

</body>
</html>
