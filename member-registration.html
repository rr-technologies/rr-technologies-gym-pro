<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Registration - RR Technologies</title>

    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="member.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">

    <h2 id="sidebarGymName">RR Technologies</h2>

    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="member-registration.html" class="active">👤 Member Registration</a>
    <a href="members-list.html">👥 Members List</a>
    <a href="fee-collection.html">💰 Fee Collection</a>
    <a href="attendance.html">📅 Attendance</a>
    <a href="reports.html">📊 Reports</a>
    <a href="settings.html">⚙️ Settings</a>
    <a href="index.html">🚪 Logout</a>

</div>

<!-- Main Content -->
<div class="main-content">

    <h1>👤 Member Registration</h1>

    <div class="form-container">

        <form id="memberForm">

            <input type="text" id="memberId" placeholder="Member ID" readonly>

            <input type="text" id="fullName" placeholder="Full Name" required>

            <input type="text" id="mobile" placeholder="Mobile Number" required>

            <input type="number" id="age" placeholder="Age" required>

            <select id="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <select id="membership" required>
                <option value="">Select Membership Plan</option>
                <option>1 Month</option>
                <option>3 Months</option>
                <option>6 Months</option>
                <option>12 Months</option>
            </select>

            <input type="date" id="joiningDate" required>

            <input type="number" id="fee" placeholder="Fee Amount" required>

            <textarea id="address" placeholder="Address"></textarea>

            <button type="submit">💾 Save Member</button>

        </form>

    </div>

</div>

<script src="common.js"></script>
<script src="member.js"></script>

</body>
</html>
