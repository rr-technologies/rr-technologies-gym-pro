<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RR Technologies - Dashboard</title>

    <link rel="stylesheet" href="sidebar.css">

    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div id="sidebarContainer"></div>

    <!-- Main Content -->
    <div class="main-content">

        <div class="dashboard-hero">

    <img id="dashboardLogo"
         src="logo.png"
         alt="Gym Logo">

    <h1>Welcome to</h1>

    <h2 id="dashboardGymName">
        RR Technologies Gym Pro
    </h2>

    <p>
        Manage Members • Attendance • Fee Collection
    </p>

</div>

        <!-- Dashboard Cards -->
        <div class="cards">

            <div class="card">
                <h3>Total Members</h3>
                <h2 id="totalMembers">0</h2>
            </div>

            <div class="card">
                <h3>Present Today</h3>
                <h2 id="presentToday">0</h2>
            </div>

            <div class="card">
                <h3>Active Members</h3>
                <h2 id="activeMembers">0</h2>
            </div>

            <div class="card warning-card">
                <h3>⚠ Expiring Soon</h3>
                <h2 id="expiringSoon">0</h2>
            </div>

        </div>

    </div>

    <script src="sidebar.js"></script>
    <script src="common.js"></script>
    <script src="dashboard.js"></script>


</body>
</html>
