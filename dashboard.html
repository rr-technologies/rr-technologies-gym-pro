<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RR Technologies - Dashboard</title>

    <link rel="stylesheet" href="sidebar.css">

    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div id="sidebarContainer"></div>

    <!-- Main Content -->
    <div class="main-content">

    
    <div class="hero-banner">

    <div class="hero-logo">
        <img id="dashboardLogo"
             src="images/logo.png"
             alt="Gym Logo">
    </div>

    <div class="hero-text">

        <h1>Welcome to</h1>

        <h2 id="dashboardGymName">
            RR Technologies Gym Pro
        </h2>

        <p>
            Professional Gym Management System
        </p>

    </div>

</div>

<div class="greeting-card">

    <h2 id="greetingText">
        👋 Good Morning
    </h2>

    <p id="dateTimeText">
        Sunday • 13 July 2026 • 06:55 PM
    </p>

</div>

        <!-- Dashboard Cards -->
        <div class="cards">

            <div class="card total-card">
                <h3>Total Members</h3>
                <h2 id="totalMembers">0</h2>
            </div>

            <div class="card attendance-card">
                <h3>Present Today</h3>
                <h2 id="presentToday">0</h2>
            </div>

            <div class="card active-card">
                <h3>Active Members</h3>
                <h2 id="activeMembers">0</h2>
            </div>


                <div class="card warning-card"
    onclick="window.location.href='notifications.html'"
    style="cursor:pointer">

    <h3>⚠ Expiring Soon click</h3>
    <h2 id="expiringSoon">0</h2>

    <p>👉 Click Here</p>

</div>

        </div>

    </div>

    <script src="sidebar.js"></script>
    <script src="common.js"></script>
    <script src="dashboard.js"></script>


</body>
</html>
