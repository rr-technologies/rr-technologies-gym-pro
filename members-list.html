<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RR Technologies - Members List</title>

    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="members-list.css">

</head>

<body>

    <!-- Sidebar -->
    <div id="sidebarContainer"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Hero Banner -->
        <!-- Members Header -->

<div class="members-header">

    <div class="search-box">

        <input
            type="text"
            id="searchMember"
            placeholder="🔍 Search Member...">

            <button id="refreshBtn" class="refresh-btn">
                  🔄 Refresh
            </button>

    </div>

    <div class="page-title">

        Members List

    </div>

</div>

        <!-- Table Wrapper -->
        <!-- Top Sticky Horizontal Scroll -->
<div class="top-scroll-wrapper">
    <div class="top-scroll">
        <div class="top-scroll-content"></div>
    </div>
</div>

        <div class="table-container">

            <table cellspacing="0">

                <thead>

                    <tr>

                        <th>S.No</th>

                        <th>Member ID</th>

                        <th>Name</th>

                        <th>Mobile</th>

                        <th>Plan</th>

                        <th>Fee</th>

                        <th>Joining Date</th>

                        <th>Expiry Date</th>

                        <th>Payment</th>

                        <th>Status</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="membersTable">

                </tbody>

            </table>

        </div>

        <!-- ==========================
     WhatsApp Modal
========================== -->

<div id="whatsappModal" class="whatsapp-modal">

    <div class="whatsapp-box">

        <h2>📱 Send WhatsApp</h2>

        <label>
            <input type="radio" name="waType" value="welcome" checked>
            Welcome Message
        </label>

        <label>
            <input type="radio" name="waType" value="due">
            Fee Due Reminder
        </label>

        <label>
            <input type="radio" name="waType" value="renew">
            Renewal Success
        </label>

        <label>
            <input type="radio" name="waType" value="custom">
            Custom Message
        </label>

        <textarea
            id="customMessage"
            placeholder="Type your custom message..."
            style="display:none;"></textarea>

        <div class="wa-buttons">

            <button id="sendWhatsAppBtn">
                📤 Send
            </button>

            <button id="closeWhatsAppBtn">
                ❌ Cancel
            </button>

        </div>

    </div>

</div>
        
    </div>

    <script src="common.js"></script>
    <script src="sidebar.js"></script>
    <script src="utils.js"></script>
    <script src="members-list.js"></script>

</body>

</html>
