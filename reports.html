<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.card h2{
    margin:10px 0;
    color:#007bff;
}

button{
    margin-top:30px;
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>

</head>
<body>

<div class="container">

<h1>📊 Gym Reports</h1>

<div class="cards">

<div class="card">
<h3>Total Members</h3>
<h2 id="totalMembers">0</h2>
</div>

<div class="card">
<h3>Present Today</h3>
<h2 id="presentMembers">0</h2>
</div>

<div class="card">
<h3>Absent Today</h3>
<h2 id="absentMembers">0</h2>
</div>

<div class="card">
<h3>Fee Collection</h3>
<h2 id="totalFees">₹0</h2>
</div>

</div>

<center>
<button onclick="location.href='dashboard.html'">
⬅ Back Dashboard
</button>
</center>

</div>

<script src="reports.js"></script>

</body>
</html>
