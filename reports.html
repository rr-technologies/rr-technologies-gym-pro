<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - RR Technologies Gym Pro</title>

    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="reports.css">
</head>
<body>

    <!-- Sidebar -->
    <div id="sidebarContainer"></div>

    <!-- Main Content -->
    <div class="main-content">

        <h1>📊 Reports</h1>

        <div class="report-cards">

            <div class="card">
                <h3>Total Members</h3>
                <h2 id="totalMembers">0</h2>
            </div>

            <div class="card">
                <h3>Total Collection</h3>
                <h2 id="totalCollection">₹0</h2>
            </div>

            <div class="card">
                <h3>Today's Collection</h3>
                <h2 id="todayCollection">₹0</h2>
            </div>

            <div class="card">
                <h3>Active Members</h3>
                <h2 id="activeMembers">0</h2>
            </div>

        </div>

        <h2>Collection Report</h2>

        <div class="report-filters">

            <div class="filter-row">

                <div class="filter-group">
                    <label>From Date</label>
                    <input type="date" id="fromDate">
                </div>

                <div class="filter-group">
                    <label>To Date</label>
                    <input type="date" id="toDate">
                </div>

                <div class="filter-group">
                    <label>Member ID</label>
                    <input type="text" id="searchMemberId" placeholder="Member ID">
                </div>

                <div class="filter-group">
                    <label>Member Name</label>
                    <input type="text" id="searchMemberName" placeholder="Member Name">
                </div>

            </div>

            <div class="filter-row">

                <div class="filter-group">
                    <label>Payment Mode</label>
                    <select id="paymentModeFilter">
                        <option value="">All</option>
                        <option>Cash</option>
                        <option>UPI</option>
                        <option>Card</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Receipt No</label>
                    <input type="text" id="receiptFilter" placeholder="Receipt No">
                </div>

                <div class="filter-buttons">

                    <button id="searchReportBtn">🔍 Search</button>

                    <button id="refreshReportBtn">🔄 Refresh</button>

                    <button id="excelReportBtn">📊 Excel</button>

                    <button id="printReportBtn">
                        🖨️ Print Report
                    </button>

                </div>

            </div>

        </div>

        <table id="reportTable">

            <thead>

                <tr>
                    <th>Receipt No</th>
                    <th>Member ID</th>
                    <th>Name</th>
                    <th>Amount</th>
                    <th>Payment Mode</th>
                    <th>Date</th>
                </tr>

            </thead>

            <tbody id="reportBody">

            </tbody>

        </table>

    </div>

    <!-- Scripts -->

    <script src="sidebar.js"></script>

    <script src="common.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <script src="reports.js"></script>

</body>
</html>
