<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - RR Technologies Gym Pro</title>

    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="reports.css">
</head>
<body>

<div class="sidebar">
    <h2>RR Technologies</h2>

    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="member-registration.html">👤 Member Registration</a>
    <a href="members-list.html">📋 Members List</a>
    <a href="fee-collection.html">💰 Fee Collection</a>
    <a href="attendance.html">📝 Attendance</a>
    <a href="reports.html" class="active">📊 Reports</a>
    <a href="settings.html">⚙️ Settings</a>
    <a href="index.html">🚪 Logout</a>
</div>

<div class="main-content">

    <h1>📊 Reports</h1>

    <div class="report-cards">

        <div class="card">
            <h3>Total Members</h3>
            <h2 id="totalMembers">0</h2>
        </div>

        <div class="card">
            <h3>Total Collection</h3>
            <h2 id="totalCollection">₹0</h2>
        </div>

        <div class="card">
            <h3>Today's Collection</h3>
            <h2 id="todayCollection">₹0</h2>
        </div>

        <div class="card">
            <h3>Active Members</h3>
            <h2 id="activeMembers">0</h2>
        </div>

    </div>

    <h2>Collection Report</h2>

    <table id="reportTable">
        <thead>
            <tr>
                <th>Receipt No</th>
                <th>Member ID</th>
                <th>Name</th>
                <th>Amount</th>
                <th>Payment Mode</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody id="reportBody">

        </tbody>

    </table>

</div>

<script src="reports.js"></script>

</body>
</html>
